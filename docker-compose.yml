services:
  webase:
    build: ./web
    container_name: web-apache
    ports:
      - "83:80"
    volumes:
      - ./web/src:/var/www/html
    depends_on:
      - dbase
    networks:
      - conection2
  dbase:
    image: mysql:latest
    container_name: bd-mysql
    hostname: bd-mysql
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: test
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/script.sql
    networks:
      - conection2
networks:
  conection2:
    driver: bridge
